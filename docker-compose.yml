services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - APP_NAME=Drop
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://drop:drop@postgres:5432/drop
      - RABBITMQ_URL=amqp://drop:dropdropdrop@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=drop
      - S3_SECRET_KEY=dropdropdrop
      - S3_BUCKET=drop
      - S3_REGION=us-east-1
      - MAX_UPLOAD_SIZE_BYTES=104857600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: worker
    environment:
      - APP_NAME=Drop
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://drop:drop@postgres:5432/drop
      - RABBITMQ_URL=amqp://drop:dropdropdrop@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=drop
      - S3_SECRET_KEY=dropdropdrop
      - S3_BUCKET=drop
      - S3_REGION=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: beat
    environment:
      - APP_NAME=Drop
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://drop:drop@postgres:5432/drop
      - RABBITMQ_URL=amqp://drop:dropdropdrop@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=drop
      - S3_SECRET_KEY=dropdropdrop
      - S3_BUCKET=drop
      - S3_REGION=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drop
      POSTGRES_USER: drop
      POSTGRES_PASSWORD: drop
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U drop -d drop" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: drop
      MINIO_ROOT_PASSWORD: dropdropdrop
    ports:
      - "${MINIO_PORT:-9005}:9000"
      - "${MINIO_CONSOLE_PORT:-9006}:9001"
    volumes:
      - minio_data:/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: drop
      RABBITMQ_DEFAULT_PASS: dropdropdrop
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"
      - "${RABBITMQ_MGMT_PORT:-15673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  redis_data:
