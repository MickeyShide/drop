name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  ci:
    name: Code Quality, Tests & Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: 1. Ruff Linting
        run: uv run ruff check .

      - name: 2. Mypy Type Checking
        run: uv run mypy src

      - name: 3. Pytest (Unit & Integration Tests)
        run: uv run pytest -v

      - name: 4. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 5. Docker Build
        run: docker build -t drop-api:latest .

  deploy:
    name: Deploy to Server via SSH
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            TARGET_DIR="${{ secrets.TARGET_DIR || '/opt/drop' }}"
            
            echo "1. Navigating to project directory: $TARGET_DIR"
            if [ ! -d "$TARGET_DIR" ]; then
              mkdir -p "$TARGET_DIR"
              git clone https://github.com/${{ github.repository }}.git "$TARGET_DIR"
            fi
            cd "$TARGET_DIR"

            echo "2. Pulling latest changes..."
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            echo "3. Rebuilding Docker Compose containers..."
            docker compose up -d --build --remove-orphans

            echo "4. Running database migrations..."
            docker compose exec -T api uv run alembic upgrade head

            echo "5. Verifying container health..."
            docker compose ps
